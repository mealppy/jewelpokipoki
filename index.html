<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>쥬얼쥬얼 콕콕콕 🎨</title>
    <style>
        /* 기본 베이지 무드 유지 */
        :root {
            --bg-color: #FDFBF7; 
            --pompom-yellow: #FCEFB4; 
            --warm-beige: #F5EBE6; 
            --point-orange-brown: #E5A93C; 
            --pompom-brown: #7A5842; 
            --btn-save-brown: #9E7A60; 
            --celebrate-blue: #3498DB; 
        }

        body { font-family: 'Malgun Gothic', sans-serif; background: var(--bg-color); display: flex; flex-direction: column; align-items: center; margin: 0; overflow: hidden; height: 100vh; user-select: none; color: var(--pompom-brown); }
        
        #uploadSection { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 100; background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(122, 88, 66, 0.12); width: 420px; box-sizing: border-box; max-height: 90vh; overflow-y: auto; border: 3px solid var(--pompom-brown); }
        #uploadSection.hidden { opacity: 0; pointer-events: none; transform: translate(-50%, -60%); transition: all 0.5s; }
        
        h1 { color: var(--point-orange-brown); font-size: 24px; margin: 0 0 10px 0; }
        .sub-title { color: var(--pompom-brown); font-size: 13px; margin-bottom: 20px; font-weight: bold; }
        
        .setting-box { background: var(--warm-beige); padding: 15px; border-radius: 12px; margin-bottom: 15px; text-align: left; font-size: 14px; color: var(--pompom-brown); }
        .setting-row { margin-bottom: 12px; display: flex; flex-direction: column; }
        .setting-row label { font-weight: bold; margin-bottom: 5px; color: var(--pompom-brown); }
        
        #uploadLabel { background-color: var(--point-orange-brown); color: white; padding: 12px 25px; border-radius: 25px; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 5px 15px rgba(229, 169, 60, 0.3); display: inline-block; width: 80%; margin-bottom: 15px; }
        #uploadInput { display: none; }
        
        #previewZone { display: none; margin-top: 15px; border-top: 2px dashed var(--point-orange-brown); padding-top: 15px; }
        .preview-canvas-wrapper { width: 200px; margin: 0 auto 12px; border: 2px solid var(--pompom-brown); border-radius: 10px; overflow: hidden; background: #fff; display: flex; justify-content: center; align-items: center; }
        #previewCanvas { width: 100%; height: auto; display: block; image-rendering: pixelated; image-rendering: crisp-edges; }
        #previewPalette { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; margin-bottom: 15px; }
        .preview-dot { width: 18px; height: 18px; border-radius: 50%; box-shadow: inset 0 1px 3px rgba(255,255,255,0.5), 0 1px 2px rgba(0,0,0,0.15); }
        
        #startBtn { background-color: var(--pompom-brown); color: white; padding: 11px 25px; border-radius: 25px; font-size: 16px; font-weight: bold; cursor: pointer; border: none; box-shadow: 0 5px 15px rgba(122, 88, 66, 0.3); width: 85%; }

        #gameArea { position: relative; width: 100%; height: calc(100vh - 140px); overflow: hidden; cursor: default; display: none; }
        #canvasContainer { position: absolute; transform-origin: 0 0; }
        #pixelCanvas { box-shadow: 0 10px 25px rgba(122, 88, 66, 0.08); border-radius: 8px; background: white; border: 2px solid var(--pompom-brown); }

        #playInfo { position: fixed; bottom: 115px; left: 50%; transform: translateX(-50%); background: white; padding: 8px 25px; border-radius: 20px; font-size: 14px; color: var(--pompom-brown); box-shadow: 0 2px 8px rgba(122, 88, 66, 0.1); display: flex; align-items: center; gap: 15px; z-index: 15; display: none; white-space: nowrap; border: 2px solid var(--pompom-yellow); }
        #playInfo b { color: var(--point-orange-brown); }
        
        .btn-group { display: flex; gap: 6px; margin-left: 10px; }
        .action-btn { color: white; border: none; padding: 5px 12px; border-radius: 12px; font-size: 12px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 4px; }
        .btn-save { background: var(--btn-save-brown); }
        .btn-reset { background: var(--pompom-brown); opacity: 0.8; }
        .btn-reset:hover { opacity: 1; }

        #jewelTray { position: fixed; bottom: 0; left: 0; width: 100%; height: 100px; background: linear-gradient(0deg, var(--pompom-yellow) 0%, var(--bg-color) 100%); border-top-left-radius: 25px; border-top-right-radius: 25px; box-shadow: 0 -5px 20px rgba(122, 88, 66, 0.08); display: flex; align-items: center; padding: 0 20px; box-sizing: border-box; z-index: 10; overflow-x: auto; display: none; border-top: 3px solid var(--pompom-brown); }
        .tray-slot { width: 62px; height: 62px; background: rgba(255,255,255,0.8); border-radius: 14px; margin: 0 6px; border: 2px solid var(--warm-beige); flex-shrink: 0; position: relative; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .tray-slot.selected { border: 3px solid var(--pompom-brown); background: #ffffff; box-shadow: 0 0 12px rgba(122, 88, 66, 0.2); transform: scale(1.1); z-index: 2; }
        .tray-slot.completed { opacity: 0.2; filter: grayscale(90%); }
        
        .jewel { width: 48px; height: 48px; border-radius: 50%; box-shadow: 0 4px 6px rgba(0,0,0,0.1), inset 0 2px 4px rgba(255,255,255,0.6); }
        .slot-count { position: absolute; bottom: 2px; right: 4px; font-size: 10px; font-weight: bold; color: white; background: var(--pompom-brown); padding: 1px 4px; border-radius: 6px; }

        #followerJewel { position: fixed; width: 28px; height: 28px; border-radius: 50%; pointer-events: none; z-index: 9999; display: none; box-shadow: 3px 5px 10px rgba(0,0,0,0.2); transform: translate(15px, 15px); }

        #mealppyCredit { position: fixed; bottom: 105px; right: 15px; font-size: 11px; color: var(--pompom-brown); opacity: 0.6; z-index: 20; font-family: Arial, sans-serif; font-weight: bold; pointer-events: none; }

        @keyframes firework {
            0% { transform: scale(0); opacity: 1; }
            80% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.1); opacity: 0; }
        }
        .celebration-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 70px; font-weight: bold; color: var(--celebrate-blue);
            text-shadow: 4px 4px 15px rgba(52, 152, 219, 0.6), -4px -4px 15px white;
            z-index: 200; display: none; animation: firework 2s ease-out;
            white-space: nowrap;
        }
        .confetti {
            position: absolute; width: 10px; height: 10px; border-radius: 50%;
            z-index: 199; display: none;
        }

        #resetModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(122, 88, 66, 0.4); z-index: 500;
            display: none; justify-content: center; align-items: center;
        }
        .modal-content {
            background: var(--warm-beige); padding: 25px; border-radius: 20px;
            text-align: center; border: 3px solid var(--pompom-brown);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); width: 320px;
        }
        .modal-content p { color: var(--pompom-brown); font-weight: bold; margin-bottom: 20px; }
        .modal-btns { display: flex; gap: 10px; justify-content: center; }
        .modal-btn { color: white; border: none; padding: 10px 20px; border-radius: 15px; font-size: 14px; cursor: pointer; font-weight: bold; width: 45%; }
        .btn-confirm { background: var(--pompom-brown); }
        .btn-cancel { background: #dc3545; }

    </style>
</head>
<body>

    <div id="uploadSection">
        <h1>🎨 쥬얼쥬얼 콕콕 🎨</h1>
        <p class="sub-title">좋아하는 이미지로 사이버 보석십자수를 콕콕</p>
        
        <label id="uploadLabel" for="uploadInput">1. 이미지 선택</label>
        <input type="file" id="uploadInput" accept="image/*">

        <div id="previewZone">
            <div class="setting-box">
                <div class="setting-row">
                    <label>도안 해상도 (가로 칸 수)</label>
                    <input type="range" id="sizeSlider" min="20" max="60" value="35">
                </div>
                <div class="setting-row">
                    <label>보석 색상 종류 수</label>
                    <input type="range" id="colorSlider" min="5" max="24" value="12">
                </div>
                <span id="infoPreview">가로 35칸 / 보석 12종류</span>
            </div>

            <h3 style="font-size:14px; color:var(--point-orange-brown); margin: 5px 0;">✨ 밑그림 미리보기</h3>
            <div class="preview-canvas-wrapper">
                <canvas id="previewCanvas"></canvas>
            </div>
            <div id="previewPalette"></div>

            <button id="startBtn">2. 이 이미지로 게임 시작! 🚀</button>
        </div>
    </div>

    <div id="gameArea">
        <div id="canvasContainer">
            <canvas id="pixelCanvas"></canvas>
        </div>

        <div id="confettiContainer"></div>
    </div>

    <div id="playInfo">
        <span>남은 보석: <b id="totalJewels">0</b></span>
        <span>붙인 보석: <b id="matchedJewels">0</b></span>
        <span>완성도: <b id="organizedPercent">0%</b></span>
        
        <div class="btn-group">
            <button class="action-btn btn-save" onclick="saveAsImage()">이미지로 저장 📸</button>
            <button class="action-btn btn-reset" onclick="showResetModal()">다른 그림 🔄</button>
        </div>
    </div>

    <div id="jewelTray"></div>
    <div id="followerJewel"></div>
    <div id="mealppyCredit">©mealppy</div>

    <div id="resetModal">
        <div class="modal-content">
            <p>경고! 지금 완성 중인 그림이 날아가요! 다른 그림을 불러올까요?</p>
            <div class="modal-btns">
                <button class="modal-btn btn-confirm" onclick="confirmReset()">웅!</button>
                <button class="modal-btn btn-cancel" onclick="closeResetModal()">아니!</button>
            </div>
        </div>
    </div>

    <script>
        const uploadInput = document.getElementById('uploadInput');
        const uploadSection = document.getElementById('uploadSection');
        const previewZone = document.getElementById('previewZone');
        const gameArea = document.getElementById('gameArea');
        const canvas = document.getElementById('pixelCanvas');
        const ctx = canvas.getContext('2d');
        const pCanvas = document.getElementById('previewCanvas');
        const pCtx = pCanvas.getContext('2d');
        const pPalette = document.getElementById('previewPalette');
        const startBtn = document.getElementById('startBtn');
        const canvasContainer = document.getElementById('canvasContainer');
        const tray = document.getElementById('jewelTray');
        const playInfo = document.getElementById('playInfo');
        const totalText = document.getElementById('totalJewels');
        const matchedText = document.getElementById('matchedJewels');
        const organizedText = document.getElementById('organizedPercent');
        const sizeSlider = document.getElementById('sizeSlider');
        const colorSlider = document.getElementById('colorSlider');
        const infoPreview = document.getElementById('infoPreview');
        const followerJewel = document.getElementById('followerJewel');
        const resetModal = document.getElementById('resetModal');
        const celebrationText = document.getElementById('celebrationText');
        const confettiContainer = document.getElementById('confettiContainer');

        let img = new Image();
        let scale = 1, panning = false;
        let pointX = 0, pointY = 0, startX = 0, startY = 0;
        let boardData = []; 
        let colorPalette = []; 
        let selectedColor = null; 
        let totalNeeded = 0, currentPlaced = 0;
        let blinkAlpha = 0.6, blinkTime = 0;
        let celebrateTimer;

        sizeSlider.oninput = () => { updatePreviewText(); generatePreview(); };
        colorSlider.oninput = () => { updatePreviewText(); generatePreview(); };

        function updatePreviewText() {
            infoPreview.innerText = `가로 ${sizeSlider.value}칸 / 보석 ${colorSlider.value}종류 (총 약 ${sizeSlider.value * sizeSlider.value}개)`;
        }

        setInterval(() => {
            blinkTime += 0.12;
            blinkAlpha = 0.45 + Math.sin(blinkTime) * 0.25; 
            if (selectedColor && gameArea.style.display === 'block') drawGame();
        }, 30);

        document.addEventListener('mousemove', (e) => {
            if (selectedColor && gameArea.style.display === 'block') {
                followerJewel.style.left = `${e.clientX}px`;
                followerJewel.style.top = `${e.clientY}px`;
            }
        });

        uploadInput.addEventListener('change', (e) => {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => img.src = ev.target.result;
            reader.readAsDataURL(file);
        });

        img.onload = () => {
            previewZone.style.display = 'block';
            updatePreviewText();
            generatePreview();
        };

        function extractDiversePalette(imgData, maxColors) {
            const counts = {};
            for (let i = 0; i < imgData.length; i += 4) {
                if (imgData[i+3] < 50) continue;
                const r = imgData[i] & 0xF0, g = imgData[i+1] & 0xF0, b = imgData[i+2] & 0xF0;
                const hex = `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
                counts[hex] = (counts[hex] || 0) + 1;
            }

            const uniqueColors = Object.keys(counts).sort((a,b) => counts[b] - counts[a]);
            if (uniqueColors.length <= maxColors) return uniqueColors;

            const selected = [];
            selected.push(uniqueColors[0]);

            function getColorDistance(c1, c2) {
                const r1 = parseInt(c1.slice(1,3), 16), g1 = parseInt(c1.slice(3,5), 16), b1 = parseInt(c1.slice(5,7), 16);
                const r2 = parseInt(c2.slice(1,3), 16), g2 = parseInt(c2.slice(3,5), 16), b2 = parseInt(c2.slice(5,7), 16);
                return Math.sqrt(Math.pow(r1-r2, 2) + Math.pow(g1-g2, 2) + Math.pow(b1-b2, 2));
            }

            for (let i = 1; i < uniqueColors.length; i++) {
                if (selected.length >= maxColors) break;
                const candidate = uniqueColors[i];

                let minDistance = Infinity;
                for (let j = 0; j < selected.length; j++) {
                    const dist = getColorDistance(candidate, selected[j]);
                    if (dist < minDistance) minDistance = dist;
                }

                if (minDistance > 45 || (minDistance > 20 && counts[candidate] > (imgData.length / 400))) {
                    selected.push(candidate);
                }
            }

            for (let i = 0; i < uniqueColors.length; i++) {
                if (selected.length >= maxColors) break;
                if (!selected.includes(uniqueColors[i])) {
                    selected.push(uniqueColors[i]);
                }
            }

            return selected;
        }

        function generatePreview() {
            if (!img.src) return;
            const tw = parseInt(sizeSlider.value);
            const pScale = tw / img.width;
            const th = Math.floor(img.height * pScale);
            
            const bufferCanvas = document.createElement('canvas');
            bufferCanvas.width = tw; bufferCanvas.height = th;
            const bCtx = bufferCanvas.getContext('2d');
            bCtx.drawImage(img, 0, 0, tw, th);
            const imgData = bCtx.getImageData(0, 0, tw, th).data;

            const maxC = parseInt(colorSlider.value);
            const palette = extractDiversePalette(imgData, maxC);

            pCanvas.width = tw * 8; pCanvas.height = th * 8;
            pCtx.clearRect(0,0, pCanvas.width, pCanvas.height);
            
            for(let y=0; y<th; y++){
                for(let x=0; x<tw; x++){
                    const idx = (y * tw + x) * 4;
                    if(imgData[idx+3] < 50) continue;
                    
                    const r = imgData[idx] & 0xF0, g = imgData[idx+1] & 0xF0, b = imgData[idx+2] & 0xF0;
                    let hex = `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
                    
                    if(!palette.includes(hex)) {
                        hex = findClosestColor(hex, palette);
                    }
                    
                    pCtx.fillStyle = hex;
                    pCtx.fillRect(x*8, y*8, 8, 8);
                }
            }

            pPalette.innerHTML = "";
            palette.forEach(color => {
                const dot = document.createElement('div');
                dot.className = 'preview-dot';
                dot.style.backgroundColor = color;
                pPalette.appendChild(dot);
            });
        }

        startBtn.onclick = () => {
            uploadSection.classList.add('hidden'); gameArea.style.display = 'block'; tray.style.display = 'flex'; playInfo.style.display = 'flex';
            resetCelebration();
            const maxW = window.innerWidth * 0.85;
            let w = img.width, h = img.height;
            if (w > maxW) { h = (maxW / w) * h; w = maxW; }
            canvas.width = w; canvas.height = h;
            pointX = (window.innerWidth - w)/2; pointY = (gameArea.offsetHeight - h)/2; scale = 1; setTransform();
            
            initializeGame();
        };

        function initializeGame() {
            const tw = parseInt(sizeSlider.value);
            const pixelSize = canvas.width / tw;
            const th = Math.floor(canvas.height / pixelSize);

            const smallCanvas = document.createElement('canvas'); const smallCtx = smallCanvas.getContext('2d');
            smallCanvas.width = tw; smallCanvas.height = th;
            smallCtx.drawImage(img, 0, 0, tw, th);
            const imageData = smallCtx.getImageData(0, 0, tw, th).data;

            const maxColors = parseInt(colorSlider.value);
            colorPalette = extractDiversePalette(imageData, maxColors);
            
            boardData = []; totalNeeded = 0; currentPlaced = 0;

            for (let i = 0; i < imageData.length; i += 4) {
                if (imageData[i+3] < 50) { boardData.push({ targetColor: null, isFilled: false }); continue; }
                const r = imageData[i] & 0xF0; const g = imageData[i+1] & 0xF0; const b = imageData[i+2] & 0xF0;
                const hex = `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
                boardData.push({ targetColor: hex, isFilled: false });
            }

            boardData.forEach(cell => {
                if (cell.targetColor && !colorPalette.includes(cell.targetColor)) {
                    cell.targetColor = findClosestColor(cell.targetColor, colorPalette);
                }
                if (cell.targetColor) totalNeeded++;
            });

            changeSelectedColor(colorPalette[0]);
            updateInfo();
            createTray();
            drawGame();
        }

        function changeSelectedColor(hex) {
            selectedColor = hex;
            if (hex) {
                followerJewel.style.display = 'block';
                followerJewel.style.background = `radial-gradient(circle at 8px 8px, white, ${hex})`;
            } else {
                followerJewel.style.display = 'none';
            }
        }

        function findClosestColor(hex, palette) {
            if(!palette || palette.length === 0) return hex;
            let r1 = parseInt(hex.slice(1,3), 16), g1 = parseInt(hex.slice(3,5), 16), b1 = parseInt(hex.slice(5,7), 16);
            let minDiff = Infinity, closest = palette[0];
            palette.forEach(p => {
                let r2 = parseInt(p.slice(1,3), 16), g2 = parseInt(p.slice(3,5), 16), b2 = parseInt(p.slice(5,7), 16);
                let diff = Math.pow(r1-r2,2) + Math.pow(g1-g2,2) + Math.pow(b1-b2,2);
                if (diff < minDiff) { minDiff = diff; closest = p; }
            });
            return closest;
        }

        function drawGame() {
            const pixelSize = canvas.width / parseInt(sizeSlider.value);
            const tw = parseInt(sizeSlider.value);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            boardData.forEach((cell, i) => {
                if (!cell.targetColor) return; 
                const x = (i % tw) * pixelSize; const y = Math.floor(i / tw) * pixelSize;

                if (cell.isFilled) {
                    const cx = x + pixelSize/2; const cy = y + pixelSize/2; const r = pixelSize * 0.44;
                    const grd = ctx.createRadialGradient(cx-r/3, cy-r/3, r/5, cx, cy, r);
                    grd.addColorStop(0, "white"); grd.addColorStop(1, cell.targetColor);
                    ctx.fillStyle = grd; ctx.beginPath(); ctx.arc(cx, cy, r, 0, 2*Math.PI); ctx.fill();
                    
                    ctx.strokeStyle = "rgba(0,0,0,0.18)"; ctx.lineWidth = 0.5;
                    ctx.beginPath(); ctx.arc(cx, cy, r, 0, 2*Math.PI); ctx.stroke();
                } else {
                    ctx.fillStyle = cell.targetColor;
                    if (cell.targetColor === selectedColor) {
                        ctx.globalAlpha = blinkAlpha;
                        ctx.fillRect(x, y, pixelSize, pixelSize);
                        ctx.strokeStyle = "rgba(255,255,255,0.7)"; ctx.lineWidth = 1;
                        ctx.strokeRect(x+0.5, y+0.5, pixelSize-1, pixelSize-1);
                    } else {
                        ctx.globalAlpha = 0.15; 
                        ctx.fillRect(x, y, pixelSize, pixelSize);
                    }
                    ctx.globalAlpha = 1.0;
                }
            });

            ctx.strokeStyle = "rgba(0,0,0,0.05)"; ctx.lineWidth = 0.5;
            for (let x = 0; x <= canvas.width; x += pixelSize) { 
                ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke(); 
            }
            for (let y = 0; y <= canvas.height; y += pixelSize) { 
                ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke(); 
            }
        }

        function createTray() {
            tray.innerHTML = "";
            colorPalette.forEach(hex => {
                const leftCount = boardData.filter(c => c.targetColor === hex && !c.isFilled).length;
                
                const slot = document.createElement('div');
                slot.className = 'tray-slot';
                if (hex === selectedColor) slot.classList.add('selected');
                if (leftCount === 0) slot.classList.add('completed');

                const jewel = document.createElement('div');
                jewel.className = 'jewel';
                jewel.style.background = `radial-gradient(circle at 15px 15px, white, ${hex})`;
                
                const countBadge = document.createElement('span');
                countBadge.className = 'slot-count';
                countBadge.innerText = leftCount;

                slot.appendChild(jewel);
                slot.appendChild(countBadge);

                slot.onclick = () => {
                    if (leftCount === 0) return; 

                    document.querySelectorAll('.tray-slot').forEach(s => s.classList.remove('selected'));
                    changeSelectedColor(hex);
                    slot.classList.add('selected');
                    drawGame();
                };
                tray.appendChild(slot);
            });
        }

        function updateInfo() {
            const leftTotal = boardData.filter(c => c.targetColor && !c.isFilled).length;
            totalText.innerText = leftTotal;
            matchedText.innerText = currentPlaced;
            const percent = totalNeeded > 0 ? Math.floor((currentPlaced / totalNeeded) * 100) : 0;
            organizedText.innerText = `${percent}%`;
            
            if (leftTotal === 0) {
                changeSelectedColor(null);
                startCelebration(); 
            }
        }

        /* 💡 대각선까지 확장된 대망의 8방향 연쇄 채우기 시스템! */
        function fillConnectedArea(startIndex, color) {
            const tw = parseInt(sizeSlider.value);
            const th = boardData.length / tw;
            let filledCount = 0;
            let queue = [startIndex];
            let visited = new Set();
            visited.add(startIndex);

            while(queue.length > 0) {
                let curr = queue.shift();
                if (boardData[curr] && boardData[curr].targetColor === color && !boardData[curr].isFilled) {
                    boardData[curr].isFilled = true;
                    filledCount++;

                    let cx = curr % tw;
                    let cy = Math.floor(curr / tw);

                    // 8방향 좌표 계산용 루프 (x축 -1~1, y축 -1~1)
                    for (let dy = -1; dy <= 1; dy++) {
                        for (let dx = -1; dx <= 1; dx++) {
                            if (dx === 0 && dy === 0) continue; // 자기 자신 제외

                            let nx = cx + dx;
                            let ny = cy + dy;

                            if (nx >= 0 && nx < tw && ny >= 0 && ny < th) {
                                let n = ny * tw + nx;
                                if (!visited.has(n)) {
                                    visited.add(n);
                                    if (boardData[n] && boardData[n].targetColor === color && !boardData[n].isFilled) {
                                        queue.push(n);
                                    }
                                }
                            }
                        }
                    }
                }
            }
            return filledCount;
        }

        function startCelebration() {
            confettiContainer.innerHTML = '';
            
            // 🎉 빵빠레 색종이 부활!
            for (let i = 0; i < 70; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = `${Math.random() * 100}%`;
                confetti.style.top = `${Math.random() * -10}vh`;

                const colors = ['#FCEFB4', '#FFE5D9', '#E5A93C', '#7A5842', '#3498DB', '#FDFBF7'];
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];

                confetti.style.animation = `confetti-fall ${Math.random() * 3 + 2}s ease-out forwards`;
                confetti.style.display = 'block';
                confettiContainer.appendChild(confetti);
            }
            clearTimeout(celebrateTimer);
        }

        function resetCelebration() {
            confettiContainer.innerHTML = '';
        }

        document.styleSheets[0].insertRule(`
            @keyframes confetti-fall {
                0% { transform: translateY(0) rotate(0deg); }
                100% { transform: translateY(120vh) rotate(${Math.random() * 360}deg); opacity: 0; }
            }
        `);

        function showResetModal() { resetModal.style.display = 'flex'; }
        function closeResetModal() { resetModal.style.display = 'none'; }
        
        function confirmReset() { 
            resetModal.style.display = 'none';
            giveUpAndGoBack(); 
        }

        function giveUpAndGoBack() {
            gameArea.style.display = 'none'; tray.style.display = 'none'; playInfo.style.display = 'none';
            resetCelebration();
            changeSelectedColor(null); uploadInput.value = ""; uploadSection.classList.remove('hidden');
        }

        /* 🛠️ 클릭 시 보석 조작과 화면 드래그 이동 간의 꼬임 방지 대수술 완료! */
        gameArea.onmousedown = (e) => {
            if (e.button === 0) { 
                const rect = canvas.getBoundingClientRect();
                if (e.clientX >= rect.left && e.clientX <= rect.right && e.clientY >= rect.top && e.clientY <= rect.bottom) {
                    const pixelSize = canvas.width / parseInt(sizeSlider.value);
                    const xs = (e.clientX - rect.left) / scale; const ys = (e.clientY - rect.top) / scale;
                    const tx = Math.floor(xs / pixelSize); const ty = Math.floor(ys / pixelSize);
                    const tw = parseInt(sizeSlider.value); const i = ty * tw + tx;

                    if (boardData[i] && boardData[i].targetColor === selectedColor && !boardData[i].isFilled) {
                        const filledCount = fillConnectedArea(i, selectedColor);
                        if (filledCount > 0) {
                            currentPlaced += filledCount;
                            
                            const nextLeft = boardData.filter(c => c.targetColor === selectedColor && !c.isFilled).length;
                            if (nextLeft === 0) {
                                const remainingColors = colorPalette.filter(hex => boardData.some(c => c.targetColor === hex && !c.isFilled));
                                if (remainingColors.length > 0) changeSelectedColor(remainingColors[0]);
                                else changeSelectedColor(null);
                            }
                            
                            updateInfo(); createTray(); drawGame();
                        }
                        // ✨ 보석 박기에 성공했다면 드래그 모드(panning)가 켜지지 않게 바로 리턴 처리해 버려요!
                        return; 
                    }
                }
            }
            // 보석을 안 누르고 바깥 빈 공간을 누를 때만 화면이 이동합니다!
            panning = true; startX = e.clientX - pointX; startY = e.clientY - pointY;
        };

        gameArea.onmousemove = (e) => { if (!panning) return; pointX = e.clientX - startX; pointY = e.clientY - startY; setTransform(); };
        document.onmouseup = () => { panning = false; };

        function setTransform() { canvasContainer.style.transform = `translate(${pointX}px, ${pointY}px) scale(${scale})`; }
        
        /* 🛠️ 마우스 포인터 중심 스크롤 확대/축소 로직 정밀 보정 */
        gameArea.onwheel = (e) => {
            e.preventDefault(); 
            const rect = gameArea.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            const xs = (mouseX - pointX) / scale; 
            const ys = (mouseY - pointY) / scale; 
            const delta = -e.deltaY;
            
            if (delta > 0) scale *= 1.15; else scale /= 1.15;
            if (scale < 0.4) scale = 0.4;
            if (scale > 10.0) scale = 10.0; 

            pointX = mouseX - xs * scale; 
            pointY = mouseY - ys * scale; 
            setTransform();
        };

        function saveAsImage() {
            const link = document.createElement('a');
            link.download = 'my_jewel_coloring_by_mealppy.png'; 
            link.href = canvas.toDataURL('image/png');
            link.click();
        }
    </script>
</body>
